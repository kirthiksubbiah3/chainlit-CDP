name: Deploy Chainlit to EKS

on:
  workflow_call:
    inputs:
      image_tag:
        required: true
        type: string

jobs:
  deploy:
    runs-on: eks-edopsclt-custom-runner

    env:
      AWS_REGION: us-east-1
      CLUSTER_NAME: sftp-eks
      BASTION_HOST: bastion.sflabs.ustpace.com
      BASTION_INSTANCE_ID: i-0bf7e391eac6ebfed
      BASTION_USER: github-actions
      K8S_NAMESPACE: dev-sentinel-mind
      ECR_REGISTRY: 442426895473.dkr.ecr.us-east-1.amazonaws.com
      ECR_REPOSITORY: sentinelmind/chainlit
      IMAGE_TAG: ${{ inputs.image_tag }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          submodules: true

      - name: Ensure AWS CLI is installed
        run: |
          if ! command -v aws &> /dev/null; then
            echo "AWS CLI not found. Installing..."
            curl "https://awscli.amazonaws.com/awscli-exe-linux-x86_64.zip" -o "awscliv2.zip"
            unzip awscliv2.zip
            sudo ./aws/install
            rm -rf awscliv2.zip aws/
          else
            echo "AWS CLI already installed."
          fi

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup SSH Key for Bastion
        run: |
          echo "${{ secrets.BASTION_SSH_KEY_PVT }}" > bastion.pem
          chmod 600 bastion.pem

      - name: Ensure Bastion is running
        id: ensure-bastion
        run: |
          set -e
          STATE=$(aws ec2 describe-instances --instance-ids "$BASTION_INSTANCE_ID" --region "$AWS_REGION" --query "Reservations[0].Instances[0].State.Name" --output text)
          echo "Current Bastion state: $STATE"
          if [ "$STATE" != "running" ]; then
            echo "Bastion is not running. Starting instance..."
            aws ec2 start-instances --instance-ids "$BASTION_INSTANCE_ID" --region "$AWS_REGION"
            echo "Waiting for Bastion to enter 'running' state..."
            aws ec2 wait instance-running --instance-ids "$BASTION_INSTANCE_ID" --region "$AWS_REGION"
            echo "Bastion started successfully."
          else
            echo "Bastion is already running."
          fi

      - name: Wait for Bastion SSH Availability
        run: |
          for i in {1..30}; do
            if nc -z -w 5 $BASTION_HOST 22; then
              echo "Bastion is reachable via SSH."
              exit 0
            fi
            echo "Waiting for Bastion SSH to become available... ($i/30)"
            sleep 10
          done
          echo "Bastion is not reachable via SSH after several attempts."
          exit 1

      - name: Wait for Bastion to access EKS pods
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
        run: |
          for i in {1..5}; do
            echo "Checking EKS pod connectivity from Bastion... Attempt $i/5"
            ssh -i bastion.pem -o StrictHostKeyChecking=no $BASTION_USER@$BASTION_HOST "
              export AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
              export AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
              export AWS_REGION=${AWS_REGION}
              aws eks update-kubeconfig --region ${AWS_REGION} --name ${CLUSTER_NAME}
              kubectl get pods -n ${K8S_NAMESPACE}
            " && exit 0
            echo "kubectl not ready, retrying in 30 seconds..."
            sleep 30
          done
          echo "Failed to connect to EKS via Bastion after several attempts."
          exit 1

      - name: Update image tag in Helm values file
        run: |
          sed -i "s|tag: .*|tag: ${IMAGE_TAG}|g" helmvalues/dev-chainlit.yaml
          echo "Updated image tag in dev-chainlit.yaml:"
          grep 'tag:' helmvalues/dev-chainlit.yaml

      - name: Copy ONLY required Helm files to Bastion
        run: |
          scp -i bastion.pem -o StrictHostKeyChecking=no helmvalues/dev-chainlit.yaml $BASTION_USER@$BASTION_HOST:/home/$BASTION_USER/helmvalues/
          scp -i bastion.pem -o StrictHostKeyChecking=no helmfiles/dev-chainlit.yaml $BASTION_USER@$BASTION_HOST:/home/$BASTION_USER/helmfiles/
          scp -i bastion.pem -o StrictHostKeyChecking=no -r helmcharts/demo-apps $BASTION_USER@$BASTION_HOST:/home/$BASTION_USER/helmcharts/

      - name: Deploy to EKS via Bastion
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: ${{ env.AWS_REGION }}
          CLUSTER_NAME: ${{ env.CLUSTER_NAME }}
          K8S_NAMESPACE: ${{ env.K8S_NAMESPACE }}
          IMAGE_TAG: ${{ env.IMAGE_TAG }}
        run: |
          ssh -i bastion.pem -o StrictHostKeyChecking=no $BASTION_USER@$BASTION_HOST << EOF
            set -e
            export AWS_ACCESS_KEY_ID="${AWS_ACCESS_KEY_ID}"
            export AWS_SECRET_ACCESS_KEY="${AWS_SECRET_ACCESS_KEY}"
            export AWS_REGION=$AWS_REGION
            export CLUSTER_NAME=$CLUSTER_NAME
            export K8S_NAMESPACE=$K8S_NAMESPACE
            export IMAGE_TAG=$IMAGE_TAG

            aws eks update-kubeconfig --region $AWS_REGION --name $CLUSTER_NAME

            cd /home/$BASTION_USER/helmfiles

            echo "Checking helmvalues/dev-chainlit.yaml on bastion:"
            cat /home/$BASTION_USER/helmvalues/dev-chainlit.yaml

            echo "Patching image tag in values file"
            sed -i "s|tag: .*|tag: ${IMAGE_TAG}|g" /home/$BASTION_USER/helmvalues/dev-chainlit.yaml

            helmfile -f dev-chainlit.yaml sync

            echo "Pods in $K8S_NAMESPACE:"
            kubectl get pods -n $K8S_NAMESPACE

            echo "Images of chainlit pods:"
            kubectl get pods -n $K8S_NAMESPACE -l app=chainlit -o=jsonpath="{range .items[*]}{.metadata.name}{': '}{.spec.containers[*].image}{'\n'}{end}"
          EOF

      - name: Cleanup SSH key
        if: always()
        run: rm -f bastion.pem

      - name: Cleanup workspace, Docker, temp files
        if: always()
        run: |
          echo "Cleaning Docker..."
          docker system prune -af || true
          docker volume prune -f || true
          docker image prune -af || true

          echo "Removing workspace files..."
          rm -rf "$GITHUB_WORKSPACE"/* || true
          rm -rf /tmp/* || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true

          echo "Cleanup complete."
