name: Security and Lint Checks

on:
  pull_request:
    branches: [ main ]
    paths-ignore:
      - 'streamlit/**'

jobs:
  trivy-dependency-scan:
    name: Trivy Scan requirements.txt
    runs-on: ubuntu-latest
    steps:
      # Fetch the code for the current SHA
      - name: Fetch code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --all
          git checkout ${{ github.sha }}

      # Install Trivy CLI if not already present
      - name: Install Trivy
        run: |
          if ! command -v trivy &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y wget curl
            wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo tee /usr/share/keyrings/trivy-keyring.asc
            echo "deb [signed-by=/usr/share/keyrings/trivy-keyring.asc] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update -y
            sudo apt-get install -y trivy
          fi

      # Run Trivy scan, skipping 'streamlit' directory
      - name: Run Trivy (excluding streamlit/)
        run: trivy fs . --format table --exit-code 1 --ignore-unfixed --vuln-type library --skip-dirs streamlit

  lint-flake8:
    name: Flake8 Lint
    runs-on: ubuntu-latest
    steps:
      # Fetch the code for the current SHA
      - name: Fetch code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --all
          git checkout ${{ github.sha }}

      # Install Python and flake8 linter
      - name: Install Python and flake8
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip
          python3 -m pip install --upgrade pip
          python3 -m pip install flake8

      # Run flake8, skipping 'streamlit' directory
      - name: Run flake8 (excluding streamlit/)
        run: python3 -m flake8 . --exclude=streamlit

  bandit-scan:
    name: Bandit Security Scan
    runs-on: ubuntu-latest
    steps:
      # Fetch the code for the current SHA
      - name: Fetch code
        run: |
          git config --global --add safe.directory "$GITHUB_WORKSPACE"
          git fetch --all
          git checkout ${{ github.sha }}

      # Install Python and Bandit security scanner
      - name: Install Python and Bandit
        run: |
          sudo apt-get update -y
          sudo apt-get install -y python3 python3-pip
          python3 -m pip install bandit

      # Run Bandit, skipping 'streamlit' directory
      - name: Run Bandit (excluding streamlit/)
        run: python3 -m bandit -r . --exclude streamlit

