name: Trivy Scan Dockerfile, K8s, and Helm Charts

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'k8s/**'
      - 'k8s-dev/**'
      - 'helmcharts/**'
      - 'helmfiles/**'
      - 'helmvalues/**'

jobs:
  trivy-scan:
    runs-on: eks-edopsclt-custom-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          if ! command -v trivy &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y wget curl
            wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo tee /usr/share/keyrings/trivy-keyring.asc
            echo "deb [signed-by=/usr/share/keyrings/trivy-keyring.asc] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update -y
            sudo apt-get install -y trivy
          fi

      - name: Install Helm
        run: |
          if ! command -v helm &> /dev/null; then
            curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
          fi
          helm version
      
      - name: Install Helmfile
        run: |
          set -e
          HELMFILE_VERSION="1.1.5"
          wget -O helmfile_linux_amd64.tar.gz https://github.com/helmfile/helmfile/releases/download/v${HELMFILE_VERSION}/helmfile_${HELMFILE_VERSION}_linux_amd64.tar.gz
          tar -xzf helmfile_linux_amd64.tar.gz
          sudo mv helmfile /usr/local/bin/helmfile
          sudo chmod +x /usr/local/bin/helmfile
          helmfile --version
                    
      - name: Trivy scan Dockerfile for config issues
        run: |
          echo "Scanning Dockerfile for configuration issues..."
          trivy config Dockerfile --exit-code 1 --severity HIGH,CRITICAL

      - name: Trivy scan Kubernetes manifests (k8s)
        run: |
          if [ -d "k8s" ]; then
            echo "Scanning k8s/ directory..."
            trivy config k8s --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No k8s directory to scan."
          fi

      - name: Trivy scan Kubernetes manifests (k8s-dev)
        run: |
          if [ -d "k8s-dev" ]; then
            echo "Scanning k8s-dev/ directory..."
            trivy config k8s-dev --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No k8s-dev directory to scan."
          fi

      - name: Trivy scan Helm chart source
        run: |
          if [ -d "helmcharts" ]; then
            echo "Scanning helmcharts/ directory for config issues..."
            trivy config helmcharts --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No helmcharts directory to scan."
          fi

      - name: Render Helm manifests with Helmfile (all apps)
        run: |
          mkdir -p rendered-manifests
          for helmfile in helmfiles/*.yaml; do
            name=$(basename "$helmfile" .yaml)
            helmfile -f "$helmfile" template > "rendered-manifests/${name}.yaml"
          done

      # - name: Show rendered dev-chainlit.yaml manifest
      #   run: |
      #     if [ -f "rendered-manifests/dev-chainlit.yaml" ]; then
      #       echo "Contents of rendered-manifests/dev-chainlit.yaml:"
      #       cat rendered-manifests/dev-chainlit.yaml
      #     else
      #       echo "rendered-manifests/dev-chainlit.yaml does not exist."
      #     fi
          
      - name: Trivy config scan on rendered Helm manifests
        run: |
          if [ -d "rendered-manifests" ]; then
            echo "Scanning all rendered manifests in rendered-manifests/ directory..."
            trivy config rendered-manifests --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No rendered-manifests directory to scan."
          fi

      - name: Cleanup workspace
        run: git clean -fdx
