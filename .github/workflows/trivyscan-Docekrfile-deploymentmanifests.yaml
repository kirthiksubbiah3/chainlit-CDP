name: Trivy Scan Dockerfile and K8s Manifests

on:
  pull_request:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'k8s/**'
      - 'k8s-dev/**'
      - 'helmcharts/**'

jobs:
  trivy-scan:
    runs-on: eks-edopsclt-custom-runner

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          if ! command -v trivy &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y wget curl
            wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo tee /usr/share/keyrings/trivy-keyring.asc
            echo "deb [signed-by=/usr/share/keyrings/trivy-keyring.asc] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update -y
            sudo apt-get install -y trivy
          fi

      - name: Trivy scan Dockerfile for config issues
        run: |
          echo "Scanning Dockerfile for configuration issues..."
          trivy config Dockerfile --exit-code 1 --severity HIGH,CRITICAL

      - name: Trivy scan Kubernetes manifests (k8s)
        run: |
          if [ -d "k8s" ]; then
            echo "Scanning k8s/ directory..."
            trivy config k8s --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No k8s directory to scan."
          fi

      - name: Trivy scan Kubernetes manifests (k8s-dev)
        run: |
          if [ -d "k8s-dev" ]; then
            echo "Scanning k8s-dev/ directory..."
            trivy config k8s-dev --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No k8s-dev directory to scan."
          fi

      - name: Trivy scan Helm charts
        run: |
          if [ -d "helmcharts" ]; then
            echo "Scanning Helm charts in helmcharts/ directory..."
            trivy config helmcharts --exit-code 1 --severity HIGH,CRITICAL
          else
            echo "No helmcharts directory to scan."
          fi

      - name: Cleanup workspace
        run: git clean -fdx
