name: Build, Test, Scan, and Push sentinel-mind to ECR

on:
  push:
    branches:
      - main
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'tests/**'
  pull_request:
    branches: [ main ]
    paths:
      - 'Dockerfile'
      - 'src/**'
      - 'tests/**'

jobs:
  unit-test:
    runs-on: eks-edopsclt-custom-runner

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Set up Python 3.12
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install uv
      run: pip install uv

    - name: Create and activate virtual environment
      run: uv venv

    - name: Sync dependencies
      run: uv sync

    - name: Run unit tests
      run: uv run python -m unittest discover -s tests

  build-scan-push:
    needs: unit-test
    runs-on: eks-edopsclt-custom-runner
    outputs:
      image_tag: ${{ steps.set-tag.outputs.image_tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v2
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v1

      - name: Set IMAGE_TAG
        id: set-tag
        run: |
          IMAGE_TAG=$(git rev-parse --short HEAD)-$(date +'%Y-%m-%d')
          echo "image_tag=$IMAGE_TAG" >> $GITHUB_OUTPUT
          echo "IMAGE_TAG=$IMAGE_TAG" >> $GITHUB_ENV

      - name: Install Trivy (if not installed)
        run: |
          if ! command -v trivy &> /dev/null; then
            sudo apt-get update -y
            sudo apt-get install -y wget curl
            wget -qO- https://aquasecurity.github.io/trivy-repo/deb/public.key | sudo tee /usr/share/keyrings/trivy-keyring.asc
            echo "deb [signed-by=/usr/share/keyrings/trivy-keyring.asc] https://aquasecurity.github.io/trivy-repo/deb $(lsb_release -cs) main" | sudo tee /etc/apt/sources.list.d/trivy.list
            sudo apt-get update -y
            sudo apt-get install -y trivy
          fi
          echo "Trivy installed at: $(which trivy)"

      - name: Build Docker Image
        env:
          ECR_REGISTRY: 442426895473.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: sentinelmind/chainlit
        run: |
          docker build --no-cache -t $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG -f Dockerfile .

      - name: Scan built Docker image with Trivy (table output, enforce fail on CRITICAL)
        env:
          ECR_REGISTRY: 442426895473.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: sentinelmind/chainlit
        run: |
          trivy image --exit-code 1 --severity CRITICAL \
            --ignorefile .trivyignore.yaml \
            --timeout 20m \
            --skip-dirs /root/.cache/uv/archive-v0 \
            --skip-dirs /root/.npm/_cacache \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Scan built Docker image with Trivy (JSON output, always)
        if: always()
        env:
          ECR_REGISTRY: 442426895473.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: sentinelmind/chainlit
        run: |
          # Include HIGH in the JSON report so HIGH vulnerabilities are visible,
          # but this step never fails (exit-code 0). Enforcement is done by the
          # earlier step which fails only on CRITICAL.
          trivy image --exit-code 0 --severity HIGH,CRITICAL \
            --ignorefile .trivyignore.yaml \
            --format json -o trivy-report.json \
            --timeout 20m \
            --skip-dirs /root/.cache/uv/archive-v0 \
            --skip-dirs /root/.npm/_cacache \
            $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Upload Trivy Scan Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-report
          path: trivy-report.json

      - name: Push Docker Image to ECR
        if: ${{ success() }}
        env:
          ECR_REGISTRY: 442426895473.dkr.ecr.us-east-1.amazonaws.com
          ECR_REPOSITORY: sentinelmind/chainlit
        run: |
          docker push $ECR_REGISTRY/$ECR_REPOSITORY:$IMAGE_TAG

      - name: Final Cleanup (Remove Docker, workspace, and temp files)
        if: always()
        run: |
          echo "Cleaning Docker..."
          docker system prune -af || true
          docker volume prune -f || true
          docker image prune -af || true

          echo "Removing workspace files..."
          rm -rf "$GITHUB_WORKSPACE"/* || true
          rm -rf /tmp/* || true
          sudo rm -rf /usr/share/dotnet || true
          sudo rm -rf /opt/ghc || true
          sudo rm -rf /usr/local/lib/android || true
          sudo rm -rf /usr/local/share/boost || true
          sudo rm -rf "$AGENT_TOOLSDIRECTORY" || true

          echo "Cleanup complete."

  deploy:
    if: github.ref_name == 'main'
    needs: build-scan-push
    uses: ./.github/workflows/chainlit-cd.yaml
    secrets: inherit
    with:
      image_tag: ${{ needs.build-scan-push.outputs.image_tag }}
