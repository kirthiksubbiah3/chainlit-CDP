mcp:
  servers:
    cloudwatch_logs:
      env:
        AWS_ACCESS_KEY_ID:
        AWS_SECRET_ACCESS_KEY:
        AWS_SESSION_TOKEN:
    cost_explorer:
      env:
        AWS_ACCESS_KEY_ID:
        AWS_SECRET_ACCESS_KEY:
        AWS_SESSION_TOKEN:
    eks:
      env:
        AWS_ACCESS_KEY_ID:
        AWS_SECRET_ACCESS_KEY:
        AWS_SESSION_TOKEN:
    github:
      headers:
          Authorization: "Bearer <GITHUB_PAT>"
          # X-MCP-Toolsets: #list out the toolsets available such as repos,issues,pull_requests,code_security,context
          # X-MCP-Readonly: #Set true for read-only operation else false
    gitlab:
      env:
        GITLAB_PERSONAL_ACCESS_TOKEN:
        GITLAB_API_URL:
    slack:
      env:
       SLACK_BOT_TOKEN:
       SLACK_TEAM_ID:
       SLACK_CHANNEL_IDS:
    jenkins:
      headers:
          Authorization:
  url_secrets:
    - name:
      url: ""
      username: ""
      password: ""
    - name:
      url: ""
      username: ""
      password: ""
