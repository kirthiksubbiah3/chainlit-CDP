chainlit_profiles:
  gemini_flash:
    config:
      model: gemini-2.5-flash
      model_provider: google_genai
      temperature: 0.5
    cost:
      input_token_cost: 0.00015
      output_token_cost: 0.0006
    icon: data:image/png;base64,
    markdown_description: Google gemini flash 2.
    starters:
    - eks
  nova_micro:
    config:
      max_tokens: 2000
      model: amazon.nova-micro-v1:0
      model_provider: bedrock_converse
      temperature: 0.0
    cost:
      input_token_cost: 3.5e-05
      output_token_cost: 0.00014
    icon: data:image/png;base64,
    markdown_description: Nova Micro. Model for text related tasks
    starters:
    - github
    - gitlab
  nova_pro:
    config:
      max_tokens: 2000
      model: amazon.nova-pro-v1:0
      model_provider: bedrock_converse
      temperature: 0.0
    cost:
      input_token_cost: 0.0008
      output_token_cost: 0.0032
    icon: data:image/png;base64,
    markdown_description: Nova Pro. Model for text related tasks
    starters:
    - cloudwatch_logs
    - cost_explorer
    - grafana
  Claude_Sonnet_3.7:
    config:
      max_tokens: 2000
      model: us.anthropic.claude-3-7-sonnet-20250219-v1:0
      model_provider: bedrock_converse
      temperature: 0.0
    cost:
      input_token_cost: 0.003
      output_token_cost: 0.015
    icon: data:image/png;base64,
    markdown_description: Claude Sonnet 3.7. Model for browser related tasks
    starters:
    - jenkins
    - playwright
chainlit_starters:
  cloudwatch_logs:
    icon: data:image/png;base64,
    label: Search and analyze AWS CloudWatch logs
    message: Retrieve and display recent logs from the bastion host EC2 instance for
      monitoring and troubleshooting purposes.
  cost_explorer:
    icon: data:image/jpeg;base64,
    label: Analyze AWS costs and usage data through the AWS Cost Explorer API.
    message: Analyze and show the cost and usage data for the AWS account, focusing
      on this month.
  github:
    icon: data:image/png;base64,
    label: Search through GitHub
    message: Search for the latest pull request in the 'sflabs' or 'sentinel-mind'
      repositories owned by the 'ust-pace' group.
  gitlab:
    icon: data:image/png;base64,
    label: Search through GitLab
    message: Search for public repositories in a GitLab group and list their latest
      commit messages.
  grafana:
    icon: data:image/png;base64,
    label: Query Grafana dashboards and data sources
    message: Query the Grafana dashboard for the 'visioncheckout' project to retrieve
      the latest metrics and visualizations.
  jenkins:
    icon: data:image/png;base64,
    label: Search through Jenkins
    message: Search for the latest build status of a Jenkins job in the 'visioncheckout'
      project.
  playwright:
    icon: data:image/jpeg;base64,
    label: Search through browser(headless)
    message: Navigate to google.com, perform a search for 'hello world', scroll through
      the results, and present them in a table format.
  eks:
    icon: "data:image/jpeg;base64,"
    label: "Create apache app"
    message: |
        Create deployment apache with replicas 2
        that is exposed by service apache on service port 8080 and target port 80
        which is further exposed by ingress apache that has url apache.sflabs.ustpace.com and class nginx
        in the namespace ai-demo of sftp-eks eks cluster
llm:
  agent:
    recursion_limit: 50
mcp:
  servers:
    cloudwatch_logs:
      args:
      - awslabs.cloudwatch-logs-mcp-server@latest
      # chainlit_command:
      #   icon: cloud
      #   id: Cloudwatch
      command: uvx
      env:
        AWS_REGION: us-east-1
      transport: stdio
    cost_explorer:
      args:
      - awslabs.cost-explorer-mcp-server@latest
      command: uvx
      env:
        AWS_REGION: us-east-1
      transport: stdio
    eks:
      args:
        - awslabs.eks-mcp-server@latest
        - --allow-write
        - --allow-sensitive-data-access
      command: uvx
      env:
        AWS_REGION: us-east-1
      transport: stdio
    slack:
      args:
        - "@modelcontextprotocol/server-slack"
        - "-y"
      command: "npx"
      transport: stdio
    default:
      args:
      - -m
      - mcp_server_fetch
      command: python3
      transport: stdio
    github:
      chainlit_command:
        icon: github
        id: GitHub
      transport: streamable_http
      url: https://api.githubcopilot.com/mcp
    gitlab:
      args:
      - -y
      - '@modelcontextprotocol/server-gitlab'
      # chainlit_command:
      #   description: Search through GitLab
      #   icon: gitlab
      #   id: GitLab
      #   usecase: Search for public repositories in a GitLab group and list their latest
      #     commit messages.
      command: npx
      transport: stdio
    grafana:
      # chainlit_command:
      #   description: Query Grafana dashboards and data sources
      #   icon: bar-chart-2
      #   id: Grafana
      #   usecase: Query the Grafana dashboard for the 'visioncheckout' project to retrieve
      #     the latest metrics and visualizations.
      transport: streamable_http
      url: http://localhost:8080/mcp
    jenkins:
      # chainlit_command:
      #   icon: repeat-2
      #   id: Jenkins
      transport: sse
      url: https://app.ustpace.io/visioncheckout/jenkins/mcp-server/sse
    playwright:
      args:
      - mcp-playwright-network@latest
      - --ignore-https-errors
      - --headless
      - --browser
      - firefox
      chainlit_command:
        description: Search through browser(headless)
        icon: globe
        id: Sentinel-Mind
        usecase: Navigate to google.com, perform a search for 'hello world', scroll
          through the results, and present them in a table format.
      command: npx
      transport: stdio
agents:
  o11y:
    chainlit_command:
      id: o11y
      icon: git-graph
  new_repo:
    chainlit_command:
      id: NewRepo
      icon: workflow
  rag:
    chainlit_command:
      description: Search through rag
      icon: file
      id: rag_search
