appName: chainlit
namespace: dev-sentinel-mind
replicas: 1
image:
  repository: 442426895473.dkr.ecr.us-east-1.amazonaws.com/observex/chainlit
  tag: latest
  pullPolicy: Always 

resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
serviceAccountName: secrets-store-csi-driver

containerPort: 8000
# env:
envFromSecret:
  - dev-chainlit-secrets

service:
  name: chainlit-app-service
  port: 80
  targetPort: 8000
  type: ClusterIP

ingress:
  enabled: true
  className: "nginx"
  annotations:
    cert-manager.io/issuer: letsencrypt-production
    nginx.ingress.kubernetes.io/rewrite-target: /
  hosts:
    - host: ai-dev.sflabs.ustpace.com
      paths:
        - path: /
          pathType: Prefix
          serviceName: chainlit-app-service
          servicePort: 80
        
  tls:
    - hosts:
        - ai-dev.sflabs.ustpace.com
      secretName: chainlit-tls

# Volume configuration
volumes:
  - name: config-secrets-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "config-secrets"
  - name: chainlit-llm-config
    configMap:
      name: chainlit-llm-config
  - name: secrets-store-inline
    csi:
      driver: secrets-store.csi.k8s.io
      readOnly: true
      volumeAttributes:
        secretProviderClass: "aws-secrets"
volumeMounts:
  - name: chainlit-llm-config
    mountPath: /app/config.yaml
    subPath: config.yaml
  - name: secrets-store-inline
    mountPath: "/mnt/secrets-store"
    readOnly: true

# These values ensure that secrets/configs are readable by the container user
podSecurityContext:
  runAsUser: 1001
  runAsGroup: 1001
  fsGroup: 1001

containerSecurityContext:
  allowPrivilegeEscalation: false
  # runAsUser: 1000
  # runAsGroup: 1000
  readOnlyRootFilesystem: false

