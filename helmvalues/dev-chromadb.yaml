appName: dev-chromadb
namespace: mcp-servers
replicas: 1
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
image:
  repository: chromadb/chroma
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8000
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
env:
  - name: CHROMADB_POOL_SIZE
    value: "20"
  - name: CHROMADB_MAX_CONNECTIONS
    value: "50"
volumeMounts:
  - name: dev-chromadb-data
    mountPath: /data

volumes:
  - name: dev-chromadb-data
    persistentVolumeClaim:
      claimName: dev-chromadb-data

service:
  name: dev-chromadb
  type: ClusterIP
  protocol: TCP
  port: 8000
  targetPort: 8000

pvc:
  enabled: true
  name: dev-chromadb-data
  accessMode: ReadWriteOnce
  storage: 20Gi
