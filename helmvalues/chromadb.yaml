appName: chromadb
namespace: mcp-servers
replicas: 1
podSecurityContext:
  fsGroup: 1000
  runAsUser: 1000
image:
  repository: chromadb/chroma
  tag: latest
  pullPolicy: IfNotPresent

containerPort: 8000

volumeMounts:
  - name: chromadb-data
    mountPath: /data
resources:
  requests:
    cpu: "500m"
    memory: "1Gi"
  limits:
    cpu: "1"
    memory: "2Gi"
volumes:
  - name: chromadb-data
    persistentVolumeClaim:
      claimName: chromadb-data
env:
  - name: CHROMADB_POOL_SIZE
    value: "20"
  - name: CHROMADB_MAX_CONNECTIONS
    value: "50"
service:
  name: chromadb
  type: ClusterIP
  protocol: TCP
  port: 8000
  targetPort: 8000

pvc:
  enabled: true
  name: chromadb-data
  accessMode: ReadWriteOnce
  storage: 20Gi
