apiVersion: secrets-store.csi.x-k8s.io/v1
kind: SecretProviderClass
metadata:
  name: config-secrets
  namespace: dev-sentinel-mind
spec:
  provider: aws
  parameters:
    objects: |
      - objectName: "dev/configsecrets"
        objectType: "secretsmanager"
        objectAlias: "secrets.yaml"
      - objectName: "sa.json"
        objectType: "secretsmanager"
    region: "us-east-1"
