# --- Identity ---
sonar.projectKey=sflabs-ai-assistant
sonar.projectName=SFLabs AI Assistant
sonar.projectVersion=1.16.0

# --- Language / encoding ---
sonar.sourceEncoding=UTF-8
sonar.scm.provider=git
sonar.python.version=3.12

# --- What to analyze (your Python lives in src/ + some scripts) ---
sonar.sources=src,scripts
sonar.inclusions=**/*.py

# --- Tests & coverage ---
sonar.tests=test
sonar.test.inclusions=test/**/*.py
sonar.python.coverage.reportPaths=coverage.xml

# --- Exclusions: non-code assets & generated/build content ---
sonar.exclusions=\
demo-videos/**,\
public/**,\
rag-files/**,\
helmchart/**,\
helmfiles/**,\
helmvalues/**,\
k8s-manifests-dev/**,\
k8s-manifests-prod/**,\
**/*.png,**/*.jpg,**/*.jpeg,**/*.gif,**/*.svg,**/*.ico,\
**/*.pdf,**/*.mp4,**/*.mov,\
**/__pycache__/**,**/*.pyc
